services:
  - type: web
    name: legal-ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: legal_ai
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXP_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXP_MINUTES
        value: "10080"
      - key: UPLOAD_DIR
        value: uploads
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: ALLOWED_ORIGINS
        sync: false
